<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Linkku — Visual Bookmark Manager</title>

<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
/>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* =========================
   ROOT
========================= */

:root{

  --bg:#0d0d0f;

  --surface:#17171a;
  --surface-hover:#1d1d22;

  --border:#29292f;

  --text:#fafafa;
  --text-secondary:#a1a1aa;
  --text-muted:#71717a;

  --radius-xl:28px;
  --radius-lg:22px;
  --radius-md:18px;
  --radius-sm:14px;

  --transition:.22s ease;

  --shadow:
    0 1px 1px rgba(0,0,0,.4),
    0 20px 40px rgba(0,0,0,.35);

}

/* =========================
   RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  min-height:100%;
}

body{
  background:var(--bg);
  color:var(--text);

  font-family:
    Inter,
    system-ui,
    sans-serif;

  -webkit-font-smoothing:antialiased;
}

/* =========================
   APP
========================= */

#app{

  width:100%;
  max-width:1550px;

  margin:auto;

  padding:40px 24px 90px;

}

/* =========================
   HEADER
========================= */

.header{

  display:flex;
  align-items:center;
  justify-content:space-between;

  margin-bottom:34px;

}

.logo{

  display:flex;
  align-items:center;
  gap:14px;

  font-size:54px;
  font-weight:800;

  letter-spacing:-2px;

}

.logo i{
  font-size:42px;
}

#count-badge{
  color:var(--text-secondary);
  font-size:14px;
}

/* =========================
   INPUT BAR
========================= */

.add-bar{

  display:flex;
  gap:16px;

  margin-bottom:28px;

}

.input{

  width:100%;
  height:74px;

  border:none;
  outline:none;

  background:var(--surface);

  border:1px solid var(--border);

  border-radius:24px;

  padding:0 24px;

  color:white;

  font-size:18px;

  transition:var(--transition);

}

.input::placeholder{
  color:#666;
}

.input:focus{
  background:#1d1d22;
  border-color:#3b3b45;
}

.primary-btn{

  height:74px;

  border:none;
  outline:none;

  background:transparent;

  border:1px solid #3a3a40;

  border-radius:24px;

  padding:0 28px;

  color:white;

  display:flex;
  align-items:center;
  gap:10px;

  font-size:18px;
  font-weight:600;

  cursor:pointer;

  transition:var(--transition);

  flex-shrink:0;

}

.primary-btn:hover{

  background:#202027;

  transform:translateY(-1px);

}

/* =========================
   FILTER
========================= */

.filters{

  display:flex;
  align-items:center;
  gap:12px;

  flex-wrap:wrap;

  margin-bottom:38px;

}

.tag-pill{

  border:none;
  outline:none;

  background:transparent;

  border:1px solid var(--border);

  border-radius:999px;

  color:var(--text-secondary);

  padding:14px 22px;

  cursor:pointer;

  transition:var(--transition);

  font-size:15px;
  font-weight:500;

}

.tag-pill:hover{

  background:#1d1d22;
  color:white;

}

.tag-pill.active{

  background:#202027;
  border-color:#3a3a40;

  color:white;

}

.search-wrap{
  margin-left:auto;
}

.search-input{

  width:340px;
  height:58px;

  border:none;
  outline:none;

  background:var(--surface);

  border:1px solid var(--border);

  border-radius:18px;

  padding:0 18px;

  color:white;

  font-size:15px;

}

/* =========================
   GRID
========================= */

.cards{

  display:grid;

  grid-template-columns:
    repeat(auto-fill,minmax(360px,1fr));

  gap:20px;

}

/* =========================
   CARD
========================= */

.card{

  background:var(--surface);

  border:1px solid var(--border);

  border-radius:var(--radius-xl);

  overflow:hidden;

  transition:var(--transition);

  box-shadow:var(--shadow);

}

.card:hover{

  transform:translateY(-4px);

  background:var(--surface-hover);

  border-color:#393942;

}

/* =========================
   PREVIEW
========================= */

.card-preview{

  width:100%;
  height:220px;

  position:relative;

  overflow:hidden;

  background:#1f1f25;

}

.card-preview img{

  width:100%;
  height:100%;

  object-fit:cover;

  display:block;

  transition:.5s ease;

}

.card:hover .card-preview img{
  transform:scale(1.05);
}

.card-preview::after{

  content:"";

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      to top,
      rgba(0,0,0,.4),
      transparent
    );

}

.preview-overlay{

  position:absolute;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;

  z-index:2;

}

.play-btn{

  width:72px;
  height:72px;

  border-radius:999px;

  background:rgba(255,255,255,.15);

  backdrop-filter:blur(10px);

  display:flex;
  align-items:center;
  justify-content:center;

  color:white;

  font-size:28px;

}

/* =========================
   BODY
========================= */

.card-body{
  padding:22px;
}

.card-top{

  display:flex;
  align-items:flex-start;
  gap:14px;

  margin-bottom:18px;

}

.favicon{

  width:46px;
  height:46px;

  border-radius:14px;

  object-fit:cover;

  flex-shrink:0;

}

.favicon-placeholder{

  width:46px;
  height:46px;

  border-radius:14px;

  background:#24242a;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#8b8b93;

  flex-shrink:0;

}

.card-title{

  font-size:19px;
  font-weight:700;

  line-height:1.4;

}

.card-url{

  margin-top:5px;

  color:var(--text-muted);

  font-size:13px;

  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;

}

.card-summary{

  color:#b5b5bd;

  line-height:1.7;

  font-size:14px;

  margin-bottom:18px;

}

.card-tags{

  display:flex;
  flex-wrap:wrap;
  gap:8px;

  margin-bottom:18px;

}

.cat-badge{

  padding:7px 12px;

  border-radius:999px;

  background:#30303a;

  color:white;

  font-size:12px;
  font-weight:600;

}

/* =========================
   FOOTER
========================= */

.card-footer{

  display:flex;
  align-items:center;
  justify-content:space-between;

}

.card-footer a{

  display:flex;
  align-items:center;
  gap:6px;

  text-decoration:none;

  color:#d4d4d8;

  font-size:14px;

}

.card-footer a:hover{
  color:white;
}

.card-actions{

  display:flex;
  gap:8px;

}

.icon-btn{

  width:40px;
  height:40px;

  border:none;

  border-radius:14px;

  background:transparent;

  color:#91919a;

  cursor:pointer;

  transition:var(--transition);

  font-size:17px;

}

.icon-btn:hover{

  background:#25252c;
  color:white;

}

/* =========================
   EMPTY
========================= */

.empty{

  grid-column:1/-1;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  padding:120px 20px;

  text-align:center;

  color:var(--text-secondary);

}

.empty i{

  font-size:64px;

  margin-bottom:18px;

}

.empty h3{

  font-size:30px;

  margin-bottom:10px;

}

/* =========================
   MODAL
========================= */

.modal-overlay{

  position:fixed;
  inset:0;

  background:rgba(0,0,0,.7);

  backdrop-filter:blur(10px);

  z-index:999;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:20px;

}

.modal{

  width:100%;
  max-width:460px;

  background:#18181d;

  border:1px solid #2d2d35;

  border-radius:32px;

  padding:30px;

  display:flex;
  flex-direction:column;
  gap:18px;

}

.modal h2{
  font-size:26px;
}

.modal label{

  display:block;

  margin-bottom:8px;

  color:#a1a1aa;

  font-size:14px;

}

.modal textarea,
.modal input{

  width:100%;

  border:none;
  outline:none;

  background:#202027;

  border:1px solid #32323a;

  border-radius:16px;

  padding:16px;

  color:white;

  font-size:14px;

}

.modal-actions{

  display:flex;
  justify-content:flex-end;
  gap:12px;

}

.modal-btn{

  height:50px;

  border:none;

  border-radius:16px;

  padding:0 18px;

  font-weight:600;

  cursor:pointer;

}

.btn-secondary{

  background:#25252d;
  color:white;

}

.btn-primary{

  background:white;
  color:black;

}

/* =========================
   MOBILE
========================= */

@media (max-width:768px){

  #app{
    padding:24px 16px 70px;
  }

  .logo{
    font-size:36px;
  }

  .logo i{
    font-size:30px;
  }

  .add-bar{
    flex-direction:column;
  }

  .primary-btn{
    width:100%;
    justify-content:center;
  }

  .search-wrap{
    width:100%;
    margin-left:0;
  }

  .search-input{
    width:100%;
  }

  .cards{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div id="app">

  <div class="header">

    <div class="logo">
      <i class="ti ti-bookmark"></i>
      Linkku
    </div>

    <span id="count-badge">
      0 link
    </span>

  </div>

  <div class="add-bar">

    <input
      id="url-input"
      class="input"
      type="url"
      placeholder="Paste URL TikTok, Reels, YouTube, Article..."
    />

    <button
      id="add-btn"
      class="primary-btn"
    >
      <i class="ti ti-plus"></i>
      Tambah ↗
    </button>

  </div>

  <div
    class="filters"
    id="filters"
  ></div>

  <div
    class="cards"
    id="cards-container"
  ></div>

</div>

<div id="modal"></div>

<script>

/* =========================
   STORAGE
========================= */

const STORAGE_KEY =
  "linkku_visual_v1";

let bookmarks = [];
let activeCategory = "all";

/* =========================
   STORAGE METHODS
========================= */

function saveData(){

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(bookmarks)
  );

}

function loadData(){

  const raw =
    localStorage.getItem(STORAGE_KEY);

  if(raw){

    bookmarks = JSON.parse(raw);

  }

  renderAll();

}

/* =========================
   HELPERS
========================= */

function escHtml(str=""){

  return str
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");

}

function getDomain(url){

  try{

    return new URL(url)
      .hostname
      .replace("www.","");

  }catch{

    return url;

  }

}

function getFavicon(url){

  try{

    const u = new URL(url);

    return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=128`;

  }catch{

    return "";

  }

}

function detectPlatform(url){

  if(
    url.includes("youtube.com") ||
    url.includes("youtu.be")
  ){
    return "youtube";
  }

  if(url.includes("tiktok.com")){
    return "tiktok";
  }

  if(url.includes("instagram.com")){
    return "instagram";
  }

  if(url.includes("twitter.com") ||
     url.includes("x.com")){
    return "twitter";
  }

  return "website";

}

/* =========================
   FETCH PREVIEW
========================= */

async function getLinkPreview(url){

  try{

    const response =
      await fetch(
        `https://api.microlink.io/?url=${encodeURIComponent(url)}`
      );

    const result =
      await response.json();

    return {

      title:
        result.data?.title ||
        getDomain(url),

      summary:
        result.data?.description ||
        "",

      thumbnail:
        result.data?.image?.url ||
        "",

      favicon:
        result.data?.logo?.url ||
        getFavicon(url)

    };

  }catch{

    return {

      title:getDomain(url),

      summary:"",
      thumbnail:"",
      favicon:getFavicon(url)

    };

  }

}

/* =========================
   ADD BOOKMARK
========================= */

async function handleAdd(){

  const input =
    document.getElementById("url-input");

  let url =
    input.value.trim();

  if(!url) return;

  if(!/^https?:\/\//i.test(url)){
    url = "https://" + url;
  }

  input.value = "";

  const tempId =
    crypto.randomUUID();

  showLoadingCard(tempId);

  const preview =
    await getLinkPreview(url);

  bookmarks.unshift({

    id:tempId,

    url,

    title:preview.title,

    summary:preview.summary,

    favicon:preview.favicon,

    thumbnail:preview.thumbnail,

    category:
      detectPlatform(url),

    createdAt:
      new Date().toISOString()

  });

  saveData();

  renderAll();

}

/* =========================
   LOADING
========================= */

function showLoadingCard(){

  const container =
    document.getElementById(
      "cards-container"
    );

  container.innerHTML = `

    <div class="card">

      <div class="card-preview"></div>

      <div class="card-body">

        <div class="card-summary">
          Mengambil preview...
        </div>

      </div>

    </div>

  `;

}

/* =========================
   DELETE
========================= */

function deleteBookmark(id){

  const ok =
    confirm("Hapus bookmark ini?");

  if(!ok) return;

  bookmarks =
    bookmarks.filter(
      b => b.id !== id
    );

  saveData();

  renderAll();

}

/* =========================
   FILTER
========================= */

function filterCat(cat){

  activeCategory = cat;

  renderFilters();
  renderCards();

}

function renderFilters(){

  const wrap =
    document.getElementById("filters");

  const cats = [

    "all",

    ...new Set(
      bookmarks.map(
        b => b.category
      )
    )

  ];

  wrap.innerHTML = "";

  cats.forEach(cat => {

    const btn =
      document.createElement("button");

    btn.className =
      "tag-pill" +
      (
        cat === activeCategory
          ? " active"
          : ""
      );

    btn.innerText =
      cat === "all"
        ? "Semua"
        : cat;

    btn.onclick = () =>
      filterCat(cat);

    wrap.appendChild(btn);

  });

  const search =
    document.createElement("div");

  search.className =
    "search-wrap";

  search.innerHTML = `

    <input
      id="search-input"
      class="search-input"
      placeholder="Cari..."
      oninput="renderCards()"
    />

  `;

  wrap.appendChild(search);

}

/* =========================
   RENDER
========================= */

function renderCards(){

  const container =
    document.getElementById(
      "cards-container"
    );

  const q =
    (
      document
        .getElementById("search-input")
        ?.value || ""
    ).toLowerCase();

  let filtered = bookmarks;

  if(activeCategory !== "all"){

    filtered =
      filtered.filter(
        b => b.category === activeCategory
      );

  }

  if(q){

    filtered =
      filtered.filter(b => {

        return (

          b.title
            .toLowerCase()
            .includes(q)

          ||

          b.url
            .toLowerCase()
            .includes(q)

          ||

          b.summary
            .toLowerCase()
            .includes(q)

        );

      });

  }

  document
    .getElementById("count-badge")
    .innerText =
      `${filtered.length} link`;

  if(!filtered.length){

    container.innerHTML = `

      <div class="empty">

        <i class="ti ti-bookmark-off"></i>

        <h3>Belum ada link</h3>

        <p>
          Tambahkan URL pertama kamu
        </p>

      </div>

    `;

    return;

  }

  container.innerHTML = "";

  filtered.forEach(b => {

    const isVideo =
      b.category !== "website";

    const card =
      document.createElement("div");

    card.className = "card";

    card.innerHTML = `

      ${
        b.thumbnail

        ? `

          <a
            href="${escHtml(b.url)}"
            target="_blank"
            class="card-preview"
          >

            <img
              src="${escHtml(b.thumbnail)}"
              alt=""
              loading="lazy"
            />

            ${
              isVideo

              ? `
                <div class="preview-overlay">

                  <div class="play-btn">
                    <i class="ti ti-player-play-filled"></i>
                  </div>

                </div>
              `

              : ""
            }

          </a>

        `

        : ""
      }

      <div class="card-body">

        <div class="card-top">

          ${
            b.favicon

            ? `
              <img
                class="favicon"
                src="${escHtml(b.favicon)}"
              />
            `

            : `
              <div class="favicon-placeholder">
                <i class="ti ti-world"></i>
              </div>
            `
          }

          <div style="min-width:0">

            <div class="card-title">
              ${escHtml(b.title)}
            </div>

            <div class="card-url">
              ${escHtml(getDomain(b.url))}
            </div>

          </div>

        </div>

        ${
          b.summary

          ? `
            <div class="card-summary">
              ${escHtml(b.summary)}
            </div>
          `

          : ""
        }

        <div class="card-tags">

          <span class="cat-badge">
            ${escHtml(b.category)}
          </span>

        </div>

        <div class="card-footer">

          <a
            href="${escHtml(b.url)}"
            target="_blank"
          >
            <i class="ti ti-external-link"></i>
            Buka
          </a>

          <div class="card-actions">

            <button
              class="icon-btn"
              onclick="deleteBookmark('${b.id}')"
            >
              <i class="ti ti-trash"></i>
            </button>

          </div>

        </div>

      </div>

    `;

    container.appendChild(card);

  });

}

function renderAll(){

  renderFilters();
  renderCards();

}

/* =========================
   EVENTS
========================= */

document
  .getElementById("add-btn")
  .addEventListener(
    "click",
    handleAdd
  );

document
  .getElementById("url-input")
  .addEventListener(
    "keydown",
    e => {

      if(e.key === "Enter"){
        handleAdd();
      }

    }
  );

/* =========================
   INIT
========================= */

loadData();

</script>

</body>
</html>
