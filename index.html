
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { padding: 1rem 0; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.header h1 { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.add-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; }
.add-bar input { flex: 1; }
.add-bar button { white-space: nowrap; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
.tag-pill { font-size: 12px; padding: 4px 12px; border-radius: 99px; border: 0.5px solid var(--color-border-secondary); color: var(--color-text-secondary); cursor: pointer; background: transparent; }
.tag-pill.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); }
.search-wrap { margin-left: auto; }
.search-wrap input { width: 180px; font-size: 13px; }
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 8px; }
.card-top { display: flex; align-items: flex-start; gap: 10px; }
.favicon { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; margin-top: 2px; object-fit: contain; }
.favicon-placeholder { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center; }
.card-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); line-height: 1.4; }
.card-url { font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-note { font-size: 13px; color: var(--color-text-secondary); line-height: 1.5; }
.card-summary { font-size: 12px; color: var(--color-text-tertiary); line-height: 1.5; font-style: italic; }
.card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: var(--color-background-secondary); color: var(--color-text-secondary); }
.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
.card-footer a { font-size: 12px; color: var(--color-text-info); text-decoration: none; display: flex; align-items: center; gap: 4px; }
.card-actions { display: flex; gap: 4px; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); font-size: 16px; padding: 2px 4px; border-radius: 4px; }
.icon-btn:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
.loading-card { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; font-size: 13px; color: var(--color-text-secondary); display: flex; align-items: center; gap: 8px; }
.pulse { animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.empty { text-align: center; color: var(--color-text-secondary); font-size: 14px; padding: 3rem 1rem; grid-column: 1/-1; }
.cat-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: #E6F1FB; color: #0C447C; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 1.5rem; width: 340px; display: flex; flex-direction: column; gap: 12px; }
.modal h2 { font-size: 16px; font-weight: 500; }
.modal label { font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
</style>

<h2 class="sr-only">Bookmark Manager — simpan dan kelola link dengan AI</h2>
<div id="app">
  <div class="header">
    <h1><i class="ti ti-bookmark" aria-hidden="true"></i> Linkku</h1>
    <span id="count-badge" style="font-size:13px;color:var(--color-text-secondary)"></span>
  </div>

  <div class="add-bar">
    <input id="url-input" type="url" placeholder="Paste URL di sini..." />
    <button id="add-btn" onclick="handleAdd()"><i class="ti ti-plus" aria-hidden="true"></i> Tambah ↗</button>
  </div>

  <div class="filters" id="filters">
    <button class="tag-pill active" data-cat="all" onclick="filterCat(this,'all')">Semua</button>
    <div class="search-wrap">
      <input id="search-input" type="text" placeholder="Cari..." oninput="renderCards()" style="font-size:13px;" />
    </div>
  </div>

  <div class="cards" id="cards-container"></div>
</div>

<div id="modal" style="display:none"></div>

<script>
const STORAGE_KEY = 'linkku_bookmarks_v1';
let bookmarks = [];
let activeCategory = 'all';

async function loadData() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    if (r && r.value) bookmarks = JSON.parse(r.value);
  } catch(e) { bookmarks = []; }
  renderAll();
}

async function saveData() {
  try { await window.storage.set(STORAGE_KEY, JSON.stringify(bookmarks)); } catch(e) {}
}

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch(e) { return url; }
}

function getFaviconUrl(url) {
  try { const u = new URL(url); return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=32`; } catch(e) { return null; }
}

async function fetchMetaWithAI(url) {
  const domain = getDomain(url);
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 300,
      messages: [{
        role: "user",
        content: `Berikan judul halaman, ringkasan singkat (1-2 kalimat), dan 2-3 tag kategori untuk URL ini: ${url}\n\nRespond ONLY in this JSON format (no markdown):\n{"title":"...","summary":"...","tags":["...","..."],"category":"..."}`
      }]
    })
  });
  const data = await res.json();
  const text = data.content.map(i => i.text||'').join('').replace(/```json|```/g,'').trim();
  return JSON.parse(text);
}

async function handleAdd() {
  const input = document.getElementById('url-input');
  const url = input.value.trim();
  if (!url) return;
  input.value = '';

  const tempId = Date.now().toString();
  const loadingEl = document.createElement('div');
  loadingEl.className = 'loading-card pulse';
  loadingEl.id = 'loading-' + tempId;
  loadingEl.innerHTML = `<i class="ti ti-loader" aria-hidden="true"></i> AI sedang menganalisis link...`;
  document.getElementById('cards-container').prepend(loadingEl);

  try {
    const meta = await fetchMetaWithAI(url);
    const bookmark = {
      id: tempId,
      url,
      title: meta.title || getDomain(url),
      summary: meta.summary || '',
      tags: meta.tags || [],
      category: meta.category || 'Lainnya',
      note: '',
      favicon: getFaviconUrl(url),
      createdAt: new Date().toISOString()
    };
    bookmarks.unshift(bookmark);
    await saveData();
  } catch(e) {
    bookmarks.unshift({
      id: tempId, url,
      title: getDomain(url),
      summary: '', tags: [], category: 'Lainnya',
      note: '', favicon: getFaviconUrl(url),
      createdAt: new Date().toISOString()
    });
    await saveData();
  }
  renderAll();
}

function filterCat(el, cat) {
  activeCategory = cat;
  document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function renderFilters() {
  const cats = ['all', ...new Set(bookmarks.map(b => b.category).filter(Boolean))];
  const container = document.getElementById('filters');
  const search = container.querySelector('.search-wrap');
  container.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tag-pill' + (cat === activeCategory ? ' active' : '');
    btn.textContent = cat === 'all' ? 'Semua' : cat;
    btn.dataset.cat = cat;
    btn.onclick = () => filterCat(btn, cat);
    container.appendChild(btn);
  });
  container.appendChild(search);
}

function renderCards() {
  const q = (document.getElementById('search-input').value||'').toLowerCase();
  const container = document.getElementById('cards-container');
  container.innerHTML = '';

  let filtered = bookmarks;
  if (activeCategory !== 'all') filtered = filtered.filter(b => b.category === activeCategory);
  if (q) filtered = filtered.filter(b =>
    b.title.toLowerCase().includes(q) ||
    b.url.toLowerCase().includes(q) ||
    (b.note||'').toLowerCase().includes(q) ||
    (b.tags||[]).some(t => t.toLowerCase().includes(q))
  );

  document.getElementById('count-badge').textContent = `${filtered.length} link`;

  if (!filtered.length) {
    container.innerHTML = '<div class="empty"><i class="ti ti-bookmark-off" style="font-size:32px;display:block;margin-bottom:8px" aria-hidden="true"></i>Belum ada link tersimpan</div>';
    return;
  }

  filtered.forEach(b => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        ${b.favicon ? `<img class="favicon" src="${b.favicon}" onerror="this.style.display='none'" alt="" />` : `<div class="favicon-placeholder"><i class="ti ti-link" style="font-size:12px" aria-hidden="true"></i></div>`}
        <div style="flex:1;min-width:0">
          <div class="card-title">${escHtml(b.title)}</div>
          <div class="card-url">${escHtml(getDomain(b.url))}</div>
        </div>
      </div>
      ${b.summary ? `<div class="card-summary">${escHtml(b.summary)}</div>` : ''}
      ${b.note ? `<div class="card-note">${escHtml(b.note)}</div>` : ''}
      <div class="card-tags">
        ${b.category ? `<span class="cat-badge">${escHtml(b.category)}</span>` : ''}
        ${(b.tags||[]).map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}
      </div>
      <div class="card-footer">
        <a href="${escHtml(b.url)}" target="_blank"><i class="ti ti-external-link" aria-hidden="true"></i> Buka</a>
        <div class="card-actions">
          <button class="icon-btn" title="Edit catatan" onclick="editNote('${b.id}')"><i class="ti ti-edit" aria-hidden="true"></i></button>
          <button class="icon-btn" title="Hapus" onclick="deleteBookmark('${b.id}')"><i class="ti ti-trash" aria-hidden="true"></i></button>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

function renderAll() { renderFilters(); renderCards(); }

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function editNote(id) {
  const b = bookmarks.find(x => x.id === id);
  if (!b) return;
  const modal = document.getElementById('modal');
  modal.style.display = 'flex';
  modal.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>Edit catatan</h2>
        <div><label>Catatan</label><textarea id="note-input" rows="3" style="width:100%;resize:vertical">${escHtml(b.note||'')}</textarea></div>
        <div><label>Kategori</label><input id="cat-input" type="text" value="${escHtml(b.category||'')}" /></div>
        <div class="modal-actions">
          <button onclick="closeModal()">Batal</button>
          <button onclick="saveNote('${id}')">Simpan ↗</button>
        </div>
      </div>
    </div>`;
}

async function saveNote(id) {
  const b = bookmarks.find(x => x.id === id);
  if (!b) return;
  b.note = document.getElementById('note-input').value;
  b.category = document.getElementById('cat-input').value || b.category;
  closeModal();
  await saveData();
  renderAll();
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

async function deleteBookmark(id) {
  bookmarks = bookmarks.filter(x => x.id !== id);
  await saveData();
  renderAll();
}

document.getElementById('url-input').addEventListener('keydown', e => { if(e.key==='Enter') handleAdd(); });

loadData();
</script>
