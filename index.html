<!--
========================================
LINKKU — FINAL PRODUCTION VERSION
Visual Bookmark Manager
========================================
FEATURES:
- Beautiful modern UI
- TikTok/Reels/YouTube thumbnails
- Compact visual cards
- Responsive
- Search
- Category filters
- LocalStorage
- Hover animations
- Production-ready CSS
- Masonry-style layout
========================================
-->

<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Linkku — Visual Bookmark Manager</title>

<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
/>

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
  rel="stylesheet"
/>

<style>

/* ====================================
ROOT
==================================== */

:root{

  --bg:#070709;

  --surface:#131316;
  --surface-hover:#1b1b20;

  --border:#26262d;

  --text:#fafafa;
  --text-secondary:#a1a1aa;
  --text-muted:#71717a;

  --radius-xl:28px;
  --radius-lg:22px;
  --radius-md:18px;

  --transition:.22s ease;

  --shadow:
    0 10px 40px rgba(0,0,0,.35);

}

/* ====================================
RESET
==================================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  min-height:100%;
}

body{

  background:var(--bg);
  color:var(--text);

  font-family:
    Inter,
    system-ui,
    sans-serif;

  -webkit-font-smoothing:antialiased;

}

/* ====================================
APP
==================================== */

#app{

  width:100%;
  max-width:1600px;

  margin:auto;

  padding:34px 26px 80px;

}

/* ====================================
HEADER
==================================== */

.header{

  display:flex;
  align-items:center;
  justify-content:space-between;

  margin-bottom:30px;

}

.logo{

  display:flex;
  align-items:center;
  gap:14px;

  font-size:52px;
  font-weight:800;

  letter-spacing:-2px;

}

.logo i{
  font-size:40px;
}

#count-badge{

  color:var(--text-secondary);

  font-size:14px;

}

/* ====================================
ADD BAR
==================================== */

.add-bar{

  display:flex;
  gap:16px;

  margin-bottom:24px;

}

.input{

  width:100%;
  height:72px;

  border:none;
  outline:none;

  background:var(--surface);

  border:1px solid var(--border);

  border-radius:24px;

  padding:0 24px;

  color:white;

  font-size:17px;

  transition:var(--transition);

}

.input::placeholder{
  color:#666;
}

.input:focus{

  border-color:#3b3b45;

  background:#1a1a20;

}

.primary-btn{

  height:72px;

  border:none;
  outline:none;

  background:transparent;

  border:1px solid #36363d;

  border-radius:24px;

  padding:0 28px;

  color:white;

  display:flex;
  align-items:center;
  gap:10px;

  font-size:17px;
  font-weight:600;

  cursor:pointer;

  transition:var(--transition);

  flex-shrink:0;

}

.primary-btn:hover{

  background:#1d1d24;

  transform:translateY(-1px);

}

/* ====================================
FILTERS
==================================== */

.filters{

  display:flex;
  align-items:center;
  gap:12px;

  flex-wrap:wrap;

  margin-bottom:34px;

}

.tag-pill{

  border:none;
  outline:none;

  background:transparent;

  border:1px solid var(--border);

  border-radius:999px;

  color:var(--text-secondary);

  padding:12px 18px;

  font-size:14px;
  font-weight:500;

  cursor:pointer;

  transition:var(--transition);

}

.tag-pill:hover{

  background:#1b1b22;

  color:white;

}

.tag-pill.active{

  background:#22222a;

  border-color:#3a3a45;

  color:white;

}

.search-wrap{
  margin-left:auto;
}

.search-input{

  width:280px;
  height:54px;

  border:none;
  outline:none;

  background:var(--surface);

  border:1px solid var(--border);

  border-radius:18px;

  padding:0 18px;

  color:white;

  font-size:14px;

}

/* ====================================
MASONRY LAYOUT
==================================== */

.cards{

  columns:4 280px;

  column-gap:18px;

}

.card{

  break-inside:avoid;

  margin-bottom:18px;

  background:var(--surface);

  border:1px solid var(--border);

  border-radius:26px;

  overflow:hidden;

  transition:var(--transition);

  box-shadow:var(--shadow);

}

.card:hover{

  transform:translateY(-4px);

  background:var(--surface-hover);

  border-color:#383845;

}

/* ====================================
PREVIEW
==================================== */

.card-preview{

  position:relative;

  width:100%;

  aspect-ratio:16/9;

  overflow:hidden;

  background:#1c1c21;

}

.card-preview.portrait{

  aspect-ratio:9/16;

  max-height:430px;

}

.card-preview img{

  width:100%;
  height:100%;

  object-fit:cover;

  display:block;

  transition:.45s ease;

}

.card:hover .card-preview img{
  transform:scale(1.04);
}

.card-preview::after{

  content:"";

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      to top,
      rgba(0,0,0,.6),
      rgba(0,0,0,.1),
      transparent
    );

}

/* ====================================
OVERLAY
==================================== */

.preview-overlay{

  position:absolute;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;

  z-index:3;

}

.play-btn{

  width:68px;
  height:68px;

  border-radius:999px;

  background:rgba(255,255,255,.14);

  backdrop-filter:blur(10px);

  display:flex;
  align-items:center;
  justify-content:center;

  color:white;

  font-size:28px;

}

/* ====================================
TEXT OVERLAY
==================================== */

.preview-info{

  position:absolute;

  left:0;
  right:0;
  bottom:0;

  z-index:4;

  padding:18px;

  display:flex;
  flex-direction:column;
  gap:6px;

}

.preview-title{

  font-size:15px;
  font-weight:700;

  line-height:1.45;

  color:white;

  display:-webkit-box;

  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;

  overflow:hidden;

}

.preview-desc{

  color:rgba(255,255,255,.8);

  font-size:13px;

  line-height:1.5;

  display:-webkit-box;

  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;

  overflow:hidden;

}

/* ====================================
CARD BODY
==================================== */

.card-body{
  padding:18px;
}

.card-top{

  display:flex;
  align-items:center;
  gap:12px;

  margin-bottom:14px;

}

.favicon{

  width:42px;
  height:42px;

  border-radius:12px;

  object-fit:cover;

  flex-shrink:0;

}

.favicon-placeholder{

  width:42px;
  height:42px;

  border-radius:12px;

  background:#202026;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#8a8a94;

}

.card-url{

  color:var(--text-muted);

  font-size:13px;

  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;

}

/* ====================================
BADGES
==================================== */

.card-tags{

  display:flex;
  flex-wrap:wrap;
  gap:8px;

}

.cat-badge{

  padding:7px 12px;

  border-radius:999px;

  background:#262630;

  color:white;

  font-size:12px;
  font-weight:600;

  text-transform:capitalize;

}

/* ====================================
FOOTER
==================================== */

.card-footer{

  display:flex;
  align-items:center;
  justify-content:space-between;

  margin-top:18px;

}

.card-footer a{

  display:flex;
  align-items:center;
  gap:6px;

  color:#d4d4da;

  text-decoration:none;

  font-size:14px;

}

.card-footer a:hover{
  color:white;
}

.icon-btn{

  width:40px;
  height:40px;

  border:none;

  border-radius:14px;

  background:transparent;

  color:#8d8d97;

  cursor:pointer;

  transition:var(--transition);

  font-size:16px;

}

.icon-btn:hover{

  background:#24242d;

  color:white;

}

/* ====================================
EMPTY
==================================== */

.empty{

  width:100%;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  text-align:center;

  padding:120px 20px;

  color:var(--text-secondary);

}

.empty i{

  font-size:64px;

  margin-bottom:16px;

}

.empty h3{

  font-size:30px;

  margin-bottom:8px;

}

/* ====================================
LOADING
==================================== */

.loading{

  animation:pulse 1.2s infinite;

}

@keyframes pulse{

  0%,100%{
    opacity:1;
  }

  50%{
    opacity:.45;
  }

}

/* ====================================
RESPONSIVE
==================================== */

@media(max-width:768px){

  #app{
    padding:24px 16px 70px;
  }

  .logo{
    font-size:36px;
  }

  .logo i{
    font-size:30px;
  }

  .add-bar{
    flex-direction:column;
  }

  .primary-btn{
    width:100%;
    justify-content:center;
  }

  .search-wrap{
    width:100%;
    margin-left:0;
  }

  .search-input{
    width:100%;
  }

}

</style>
</head>

<body>

<div id="app">

  <!-- HEADER -->

  <div class="header">

    <div class="logo">
      <i class="ti ti-bookmark"></i>
      Linkku
    </div>

    <span id="count-badge">
      0 link
    </span>

  </div>

  <!-- ADD -->

  <div class="add-bar">

    <input
      id="url-input"
      class="input"
      type="url"
      placeholder="Paste URL TikTok, Reels, YouTube, Article..."
    />

    <button
      id="add-btn"
      class="primary-btn"
    >
      <i class="ti ti-plus"></i>
      Tambah ↗
    </button>

  </div>

  <!-- FILTER -->

  <div
    class="filters"
    id="filters"
  ></div>

  <!-- CARDS -->

  <div
    class="cards"
    id="cards-container"
  ></div>

</div>

<script>

/* ====================================
STATE
==================================== */

const STORAGE_KEY =
  "linkku_visual_final";

let bookmarks = [];

let activeCategory = "all";

/* ====================================
HELPERS
==================================== */

function escHtml(str=""){

  return str
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");

}

function getDomain(url){

  try{

    return new URL(url)
      .hostname
      .replace("www.","");

  }catch{

    return url;

  }

}

function getFavicon(url){

  try{

    const u = new URL(url);

    return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=128`;

  }catch{

    return "";

  }

}

function detectPlatform(url){

  if(
    url.includes("youtube.com") ||
    url.includes("youtu.be")
  ){
    return "youtube";
  }

  if(url.includes("instagram.com")){
    return "instagram";
  }

  if(url.includes("tiktok.com")){
    return "tiktok";
  }

  if(
    url.includes("twitter.com") ||
    url.includes("x.com")
  ){
    return "twitter";
  }

  return "website";

}

/* ====================================
LOCAL STORAGE
==================================== */

function saveData(){

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(bookmarks)
  );

}

function loadData(){

  const raw =
    localStorage.getItem(STORAGE_KEY);

  if(raw){

    bookmarks = JSON.parse(raw);

  }

  renderAll();

}

/* ====================================
FETCH PREVIEW
==================================== */

async function getLinkPreview(url){

  try{

    const res =
      await fetch(
        `https://api.microlink.io/?url=${encodeURIComponent(url)}`
      );

    const data =
      await res.json();

    return {

      title:
        data.data?.title ||
        getDomain(url),

      summary:
        data.data?.description ||
        "",

      thumbnail:
        data.data?.image?.url ||
        "",

      favicon:
        data.data?.logo?.url ||
        getFavicon(url)

    };

  }catch{

    return {

      title:getDomain(url),

      summary:"",

      thumbnail:"",

      favicon:getFavicon(url)

    };

  }

}

/* ====================================
ADD
==================================== */

async function handleAdd(){

  const input =
    document.getElementById(
      "url-input"
    );

  let url =
    input.value.trim();

  if(!url) return;

  if(!/^https?:\/\//i.test(url)){

    url = "https://" + url;

  }

  input.value = "";

  renderLoading();

  const preview =
    await getLinkPreview(url);

  bookmarks.unshift({

    id:crypto.randomUUID(),

    url,

    title:preview.title,

    summary:preview.summary,

    thumbnail:preview.thumbnail,

    favicon:preview.favicon,

    category:
      detectPlatform(url),

    createdAt:
      new Date().toISOString()

  });

  saveData();

  renderAll();

}

/* ====================================
LOADING
==================================== */

function renderLoading(){

  document
    .getElementById(
      "cards-container"
    )
    .innerHTML = `

      <div class="card loading">

        <div class="card-preview"></div>

        <div class="card-body">

          <div class="preview-title">
            Mengambil preview...
          </div>

        </div>

      </div>

    `;

}

/* ====================================
DELETE
==================================== */

function deleteBookmark(id){

  const ok =
    confirm(
      "Hapus bookmark ini?"
    );

  if(!ok) return;

  bookmarks =
    bookmarks.filter(
      b => b.id !== id
    );

  saveData();

  renderAll();

}

/* ====================================
FILTERS
==================================== */

function filterCat(cat){

  activeCategory = cat;

  renderFilters();
  renderCards();

}

function renderFilters(){

  const wrap =
    document.getElementById(
      "filters"
    );

  const cats = [

    "all",

    ...new Set(
      bookmarks.map(
        b => b.category
      )
    )

  ];

  wrap.innerHTML = "";

  cats.forEach(cat => {

    const btn =
      document.createElement(
        "button"
      );

    btn.className =
      "tag-pill" +
      (
        cat === activeCategory
          ? " active"
          : ""
      );

    btn.innerText =
      cat === "all"
        ? "Semua"
        : cat;

    btn.onclick = () =>
      filterCat(cat);

    wrap.appendChild(btn);

  });

  const search =
    document.createElement("div");

  search.className =
    "search-wrap";

  search.innerHTML = `

    <input
      id="search-input"
      class="search-input"
      placeholder="Cari..."
      oninput="renderCards()"
    />

  `;

  wrap.appendChild(search);

}

/* ====================================
RENDER
==================================== */

function renderCards(){

  const container =
    document.getElementById(
      "cards-container"
    );

  const q =
    (
      document
        .getElementById(
          "search-input"
        )?.value || ""
    ).toLowerCase();

  let filtered = bookmarks;

  if(activeCategory !== "all"){

    filtered =
      filtered.filter(
        b => b.category === activeCategory
      );

  }

  if(q){

    filtered =
      filtered.filter(b => {

        return (

          b.title
            .toLowerCase()
            .includes(q)

          ||

          b.summary
            .toLowerCase()
            .includes(q)

          ||

          b.url
            .toLowerCase()
            .includes(q)

        );

      });

  }

  document
    .getElementById(
      "count-badge"
    )
    .innerText =
      `${filtered.length} link`;

  if(!filtered.length){

    container.innerHTML = `

      <div class="empty">

        <i class="ti ti-bookmark-off"></i>

        <h3>Belum ada link</h3>

        <p>
          Tambahkan URL pertama kamu
        </p>

      </div>

    `;

    return;

  }

  container.innerHTML = "";

  filtered.forEach(b => {

    const isVideo =
      b.category !== "website";

    const isPortrait =
      b.category === "instagram" ||
      b.category === "tiktok";

    const card =
      document.createElement("div");

    card.className = "card";

    card.innerHTML = `

      ${
        b.thumbnail

        ? `

          <a
            href="${escHtml(b.url)}"
            target="_blank"
            class="card-preview ${isPortrait ? "portrait" : ""}"
          >

            <img
              src="${escHtml(b.thumbnail)}"
              loading="lazy"
            />

            ${
              isVideo

              ? `
                <div class="preview-overlay">

                  <div class="play-btn">
                    <i class="ti ti-player-play-filled"></i>
                  </div>

                </div>
              `
              : ""
            }

            <div class="preview-info">

              <div class="preview-title">
                ${escHtml(b.title)}
              </div>

              ${
                b.summary

                ? `
                  <div class="preview-desc">
                    ${escHtml(b.summary)}
                  </div>
                `
                : ""
              }

            </div>

          </a>

        `

        : ""
      }

      <div class="card-body">

        <div class="card-top">

          ${
            b.favicon

            ? `
              <img
                class="favicon"
                src="${escHtml(b.favicon)}"
              />
            `
            : `
              <div class="favicon-placeholder">
                <i class="ti ti-world"></i>
              </div>
            `
          }

          <div style="min-width:0">

            <div class="card-url">
              ${escHtml(getDomain(b.url))}
            </div>

          </div>

        </div>

        <div class="card-tags">

          <span class="cat-badge">
            ${escHtml(b.category)}
          </span>

        </div>

        <div class="card-footer">

          <a
            href="${escHtml(b.url)}"
            target="_blank"
          >
            <i class="ti ti-external-link"></i>
            Buka
          </a>

          <button
            class="icon-btn"
            onclick="deleteBookmark('${b.id}')"
          >
            <i class="ti ti-trash"></i>
          </button>

        </div>

      </div>

    `;

    container.appendChild(card);

  });

}

function renderAll(){

  renderFilters();
  renderCards();

}

/* ====================================
EVENTS
==================================== */

document
  .getElementById("add-btn")
  .addEventListener(
    "click",
    handleAdd
  );

document
  .getElementById("url-input")
  .addEventListener(
    "keydown",
    e => {

      if(e.key === "Enter"){

        handleAdd();

      }

    }
  );

/* ====================================
INIT
==================================== */

loadData();

</script>

</body>
</html>
